name: CI/CD Nodejs to ECR then EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: ./server

      - name: Lint
        run: npm run lint:ci
        working-directory: ./server

      - name: Run tests
        run: npm test
        working-directory: ./server

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate AWS Credentials
        run: |
          MISSING_SECRETS=()
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then MISSING_SECRETS+=("AWS_ACCESS_KEY_ID"); fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then MISSING_SECRETS+=("AWS_SECRET_ACCESS_KEY"); fi
          if [ -z "${{ secrets.AWS_REGION }}" ]; then MISSING_SECRETS+=("AWS_REGION"); fi
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then MISSING_SECRETS+=("AWS_ACCOUNT_ID"); fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then MISSING_SECRETS+=("EC2_HOST"); fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then MISSING_SECRETS+=("EC2_USER"); fi
          if [ -z "${{ secrets.EC2_KEY }}" ]; then MISSING_SECRETS+=("EC2_KEY"); fi
          
          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "::error::Katta ehtimol bilan quyidagi GitHub Secrets (Maxfiy kalitlar) sozlanmagan:"
            for secret in "${MISSING_SECRETS[@]}"; do
              echo "::error:: - $secret"
            done
            echo "::error::Iltimos, ularni repository sozlamalaridan qo'shing: Settings -> Secrets and variables -> Actions -> Repository secrets."
            exit 1
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build Docker image
        run: docker build -t clinika-website ./server

      - name: Tag image
        run: |
          docker tag clinika-website:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clinika-website:latest

      - name: Push image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clinika-website:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clinika-website:latest

            docker stop clinika-website || true
            docker rm clinika-website || true

            docker run -d \
              -p 5000:5000 \
              --name clinika-website \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clinika-website:latest